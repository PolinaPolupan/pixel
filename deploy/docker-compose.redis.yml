services:
  engine:
    environment:
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
    depends_on:
      - redis
    networks:
      - pixel-net

  redis:
    image: "redislabs/redismod"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - pixel-net

volumes:
  redis_data: