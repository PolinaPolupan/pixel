services:
  engine:
    build:
      context: ../engine
    ports:
      - '8080:8080'
    environment:
      APP_NAME: ${APP_NAME}
      DATA_DIR: ${DATA_DIR}
      DUMP_DIR: ${DUMP_DIR}
      NODE_SERVICE_URL: ${NODE_SERVICE_URL}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
    volumes:
      - ../${DATA_DIR}:/app/${DATA_DIR}
    depends_on:
      - node
    networks:
      - pixel-net

  node:
    build:
      context: ../node
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../node:/app
      - ../${EXECUTION_GRAPH_DIR}:/app/execution_graph
      - ../models:/app/models
    environment:
      ENGINE_SERVICE_URL: ${ENGINE_SERVICE_URL}
      EXECUTION_GRAPH_DIR: ${EXECUTION_GRAPH_DIR}
      HOST_PROJECT_ROOT: ${PWD}/..
    networks:
      - pixel-net

  frontend:
    build:
      context: ../frontend
    ports:
      - "5173:5173"
    volumes:
      - ../frontend/src:/app/src
    environment:
      NODE_ENV: development
    stdin_open: true
    tty: true
    command: npm run dev
    networks:
      - pixel-net

networks:
  pixel-net:
    name: pixel-net
    driver: bridge